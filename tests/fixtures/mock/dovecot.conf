dovecot_config_version = 2.4.3
dovecot_storage_version = 2.4.3

base_dir = /run/dovecot
state_dir = /run/dovecot

log_path = /dev/stdout

protocols {
  imap = yes
}

mail_driver = maildir
mailbox_list_layout = fs
mailbox_list_utf8 = yes
mail_path = ~/mail
mail_home = /srv/vmail/%{user | lower}
mail_utf8_extensions = yes
imap4rev2_enable = yes

mail_uid = vmail
mail_gid = vmail

namespace inbox {
  inbox = yes
  separator = /
}

import_environment {
  DOVEADM_PASSWORD = %{env:DOVEADM_PASSWORD | default}
  USER_PASSWORD = %{env:USER_PASSWORD | default('{CRYPT}*')}
}

passdb static {
  password = %{env:USER_PASSWORD}
}

doveadm_password = $ENV:DOVEADM_PASSWORD

ssl_server_cert_file = /etc/dovecot/ssl/tls.crt
ssl_server_key_file = /etc/dovecot/ssl/tls.key

!include_try vendor.d/*.conf
