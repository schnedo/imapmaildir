---
name: Rust

on:
  pull_request:
    branches:
      - "main"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"
  SKIP_SHELL_HOOK: 1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: "${{ vars.CACHIX_CACHE }}"
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: cache cargo packages
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cmd-format: nix develop -c {0}
      - name: Build
        run: nix develop -c cargo build --verbose
      - name: Run tests
        # todo: have a look at criterion.rs
        # todo: have a look at cargo mutants
        run: nix develop -c cargo nextest run --profile ci
      - name: Lint
        run: nix develop -c cargo clippy --all-targets --all-features
