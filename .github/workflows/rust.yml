---
name: Rust

on:
  pull_request:
    branches:
      - "main"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"
  SKIP_SHELL_HOOK: 1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          name: "${{ vars.CACHIX_CACHE }}"
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: cache cargo packages
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cmd-format: nix develop -c {0}
      - name: Build
        run: nix develop -c cargo build --verbose
      - name: Run tests
        # todo: have a look at criterion.rs
        # todo: have a look at cargo mutants
        run: nix develop -c cargo nextest run --profile ci
      - name: Lint
        run: nix develop -c cargo clippy --all-targets --all-features
